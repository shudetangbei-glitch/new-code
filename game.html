<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#08111f" />
  <title>接住星光</title>
  <style>
    :root {
      --bg: #08111f;
      --panel: rgba(17, 31, 52, .84);
      --line: rgba(174, 206, 255, .18);
      --text: #f5f8ff;
      --muted: #9fb0c9;
      --accent: #62d5ff;
      --gold: #ffd166;
      --danger: #ff6b7a;
    }
    * { box-sizing: border-box; }
    html, body { min-height: 100%; }
    body {
      margin: 0;
      color: var(--text);
      background:
        radial-gradient(circle at 20% 0%, rgba(62, 130, 200, .24), transparent 34%),
        radial-gradient(circle at 85% 20%, rgba(116, 74, 189, .19), transparent 30%),
        var(--bg);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Microsoft YaHei", sans-serif;
      overflow-x: hidden;
    }
    .shell { width: min(100% - 28px, 780px); margin: 0 auto; padding: 24px 0 40px; }
    .topbar { display: flex; justify-content: space-between; align-items: end; gap: 16px; margin-bottom: 16px; }
    h1 { margin: 0; font-size: clamp(26px, 5vw, 42px); letter-spacing: .02em; }
    .intro { margin: 7px 0 0; color: var(--muted); font-size: 14px; }
    .stats { display: flex; gap: 9px; }
    .stat { min-width: 76px; padding: 9px 11px; border: 1px solid var(--line); border-radius: 12px; background: rgba(9, 20, 36, .66); text-align: center; }
    .stat-label { display: block; color: var(--muted); font-size: 11px; }
    .stat-value { display: block; margin-top: 2px; font-size: 21px; font-weight: 750; }
    .game-wrap { position: relative; }
    canvas {
      display: block; width: 100%; height: min(72vh, 610px); min-height: 430px;
      border: 1px solid var(--line); border-radius: 18px;
      background: linear-gradient(180deg, rgba(8, 18, 35, .72), rgba(5, 12, 24, .95));
      box-shadow: 0 20px 60px rgba(0,0,0,.24);
      touch-action: none;
    }
    .overlay { position: absolute; inset: 0; display: grid; place-items: center; padding: 24px; border-radius: 18px; background: rgba(5, 12, 24, .52); }
    .overlay[hidden] { display: none; }
    .dialog { width: min(100%, 390px); padding: 26px; border: 1px solid var(--line); border-radius: 18px; background: var(--panel); box-shadow: 0 20px 55px rgba(0,0,0,.28); text-align: center; backdrop-filter: blur(12px); }
    .dialog h2 { margin: 0 0 10px; font-size: 25px; }
    .dialog p { margin: 0 0 20px; color: var(--muted); line-height: 1.65; font-size: 14px; }
    button { border: 0; border-radius: 11px; font: inherit; font-weight: 700; cursor: pointer; }
    .primary { min-height: 46px; padding: 0 22px; color: #06111e; background: var(--accent); box-shadow: 0 8px 22px rgba(98,213,255,.2); }
    .primary:hover { filter: brightness(1.08); }
    .primary:active { transform: translateY(1px); }
    .help { margin: 13px 2px 0; color: var(--muted); font-size: 12px; text-align: center; }
    @media (max-width: 560px) {
      .shell { width: min(100% - 18px, 780px); padding-top: 15px; }
      .topbar { display: block; }
      .stats { margin-top: 15px; }
      .stat { flex: 1; }
      canvas { height: 66vh; min-height: 430px; border-radius: 14px; }
    }
  </style>
</head>
<body>
  <main class="shell">
    <header class="topbar">
      <div>
        <h1>接住星光</h1>
        <p class="intro">移动篮子，接住蓝色星星，避开红色陨石。</p>
      </div>
      <div class="stats" aria-label="游戏数据">
        <div class="stat"><span class="stat-label">得分</span><span class="stat-value" id="score">0</span></div>
        <div class="stat"><span class="stat-label">剩余</span><span class="stat-value" id="time">30</span></div>
        <div class="stat"><span class="stat-label">最高</span><span class="stat-value" id="best">0</span></div>
      </div>
    </header>

    <section class="game-wrap">
      <canvas id="game" aria-label="接住星光游戏区域"></canvas>
      <div class="overlay" id="overlay">
        <div class="dialog">
          <h2 id="dialogTitle">准备好了吗？</h2>
          <p id="dialogText">30 秒内尽可能多地接住星星。电脑用左右方向键或鼠标，手机直接拖动篮子。</p>
          <button class="primary" id="startBtn">开始游戏</button>
        </div>
      </div>
    </section>
    <p class="help">蓝星 +1　金星 +3　红色陨石 -2　按空格可暂停</p>
  </main>

  <script>
    (() => {
      const canvas = document.getElementById("game");
      const ctx = canvas.getContext("2d");
      const scoreEl = document.getElementById("score");
      const timeEl = document.getElementById("time");
      const bestEl = document.getElementById("best");
      const overlay = document.getElementById("overlay");
      const titleEl = document.getElementById("dialogTitle");
      const textEl = document.getElementById("dialogText");
      const startBtn = document.getElementById("startBtn");

      const state = {
        running: false, paused: false, score: 0, time: 30, last: 0,
        spawn: 0, items: [], sparks: [], keys: new Set(), pointerX: null,
        best: Number(localStorage.getItem("star-catcher-best") || 0)
      };
      bestEl.textContent = state.best;

      const player = { x: 0, y: 0, w: 96, h: 18, speed: 470 };
      let scale = 1;
      let width = 0;
      let height = 0;

      function resize() {
        const rect = canvas.getBoundingClientRect();
        scale = Math.min(window.devicePixelRatio || 1, 2);
        width = rect.width; height = rect.height;
        canvas.width = Math.floor(width * scale);
        canvas.height = Math.floor(height * scale);
        ctx.setTransform(scale, 0, 0, scale, 0, 0);
        player.y = height - 38;
        player.x = Math.max(0, Math.min(width - player.w, player.x || (width - player.w) / 2));
      }
      window.addEventListener("resize", resize);
      resize();

      function setScore(value) { state.score = Math.max(0, value); scoreEl.textContent = state.score; }
      function setTime(value) { state.time = Math.max(0, Math.ceil(value)); timeEl.textContent = state.time; }

      function reset() {
        setScore(0); setTime(30); state.items = []; state.sparks = [];
        state.spawn = 0; state.paused = false; player.x = (width - player.w) / 2;
      }

      function showStart(title, text, buttonText) {
        titleEl.textContent = title; textEl.textContent = text; startBtn.textContent = buttonText;
        overlay.hidden = false;
      }

      function start() {
        reset(); state.running = true; state.last = performance.now(); overlay.hidden = true;
        requestAnimationFrame(loop);
      }

      function finish() {
        state.running = false;
        if (state.score > state.best) {
          state.best = state.score;
          localStorage.setItem("star-catcher-best", String(state.best));
          bestEl.textContent = state.best;
        }
        showStart("时间到！", `你拿到了 ${state.score} 分。再来一局，看看能不能刷新最高分。`, "再玩一次");
      }

      function pause() {
        if (!state.running) return;
        state.paused = !state.paused;
        if (state.paused) showStart("游戏暂停", "休息一下，准备好后继续挑战。", "继续游戏");
        else { overlay.hidden = true; state.last = performance.now(); requestAnimationFrame(loop); }
      }

      startBtn.addEventListener("click", () => state.paused ? pause() : start());
      window.addEventListener("keydown", (event) => {
        if (["ArrowLeft", "ArrowRight", "a", "d", "A", "D"].includes(event.key)) {
          state.keys.add(event.key); event.preventDefault();
        }
        if (event.code === "Space") { event.preventDefault(); pause(); }
      });
      window.addEventListener("keyup", (event) => state.keys.delete(event.key));

      function pointerPosition(event) {
        const rect = canvas.getBoundingClientRect();
        return Math.max(0, Math.min(width - player.w, event.clientX - rect.left - player.w / 2));
      }
      canvas.addEventListener("pointerdown", (event) => { state.pointerX = pointerPosition(event); canvas.setPointerCapture(event.pointerId); });
      canvas.addEventListener("pointermove", (event) => { if (state.pointerX !== null) state.pointerX = pointerPosition(event); });
      canvas.addEventListener("pointerup", () => { state.pointerX = null; });
      canvas.addEventListener("pointercancel", () => { state.pointerX = null; });

      function spawnItem() {
        const roll = Math.random();
        const type = roll < .14 ? "meteor" : roll < .27 ? "gold" : "star";
        const radius = type === "meteor" ? 15 : type === "gold" ? 13 : 11;
        state.items.push({
          type, x: radius + Math.random() * (width - radius * 2), y: -radius - 10,
          r: radius, speed: 125 + Math.random() * 105 + (30 - state.time) * 2.2,
          spin: Math.random() * Math.PI * 2
        });
      }

      function burst(x, y, color) {
        for (let i = 0; i < 9; i++) state.sparks.push({
          x, y, vx: (Math.random() - .5) * 180, vy: (Math.random() - .5) * 180,
          life: .5, color
        });
      }

      function hit(item) {
        return item.y + item.r > player.y && item.y - item.r < player.y + player.h &&
          item.x + item.r > player.x && item.x - item.r < player.x + player.w;
      }

      function update(dt) {
        const dir = state.keys.has("ArrowLeft") || state.keys.has("a") || state.keys.has("A") ? -1 :
          state.keys.has("ArrowRight") || state.keys.has("d") || state.keys.has("D") ? 1 : 0;
        if (dir) player.x += dir * player.speed * dt;
        if (state.pointerX !== null) player.x += (state.pointerX - player.x) * Math.min(1, dt * 14);
        player.x = Math.max(0, Math.min(width - player.w, player.x));

        setTime(state.time - dt);
        state.spawn -= dt;
        if (state.spawn <= 0) { spawnItem(); state.spawn = Math.max(.22, .58 - (30 - state.time) * .006); }

        for (const item of state.items) {
          item.y += item.speed * dt; item.spin += dt * 3;
          if (hit(item)) {
            setScore(state.score + (item.type === "meteor" ? -2 : item.type === "gold" ? 3 : 1));
            burst(item.x, item.y, item.type === "meteor" ? "#ff6b7a" : item.type === "gold" ? "#ffd166" : "#62d5ff");
            item.dead = true;
          }
        }
        state.items = state.items.filter(item => !item.dead && item.y < height + 30);
        for (const spark of state.sparks) { spark.x += spark.vx * dt; spark.y += spark.vy * dt; spark.life -= dt * 1.8; }
        state.sparks = state.sparks.filter(spark => spark.life > 0);
        if (state.time <= 0) finish();
      }

      function drawStar(x, y, outer, inner, color, rotation) {
        ctx.save(); ctx.translate(x, y); ctx.rotate(rotation); ctx.beginPath();
        for (let i = 0; i < 10; i++) {
          const radius = i % 2 ? inner : outer;
          const angle = -Math.PI / 2 + i * Math.PI / 5;
          ctx.lineTo(Math.cos(angle) * radius, Math.sin(angle) * radius);
        }
        ctx.closePath(); ctx.fillStyle = color; ctx.shadowColor = color; ctx.shadowBlur = 14; ctx.fill(); ctx.restore();
      }

      function drawMeteor(item) {
        ctx.save(); ctx.translate(item.x, item.y); ctx.rotate(item.spin);
        ctx.fillStyle = "#ff6b7a"; ctx.shadowColor = "#ff6b7a"; ctx.shadowBlur = 14;
        ctx.beginPath(); ctx.moveTo(0, -item.r); ctx.lineTo(item.r * .8, -item.r * .2);
        ctx.lineTo(item.r * .62, item.r); ctx.lineTo(-item.r * .7, item.r * .75);
        ctx.lineTo(-item.r, -.2 * item.r); ctx.closePath(); ctx.fill(); ctx.restore();
      }

      function draw() {
        ctx.clearRect(0, 0, width, height);
        const gradient = ctx.createLinearGradient(0, 0, 0, height);
        gradient.addColorStop(0, "rgba(23, 54, 92, .18)"); gradient.addColorStop(1, "rgba(4, 10, 20, .35)");
        ctx.fillStyle = gradient; ctx.fillRect(0, 0, width, height);

        for (let i = 0; i < 42; i++) {
          const x = (i * 97) % width, y = (i * 53) % height;
          ctx.fillStyle = `rgba(210, 231, 255, ${.15 + (i % 3) * .08})`;
          ctx.fillRect(x, y, i % 2 ? 1 : 2, i % 2 ? 1 : 2);
        }

        for (const item of state.items) item.type === "meteor" ? drawMeteor(item) :
          drawStar(item.x, item.y, item.r, item.r * .43, item.type === "gold" ? "#ffd166" : "#62d5ff", item.spin);
        for (const spark of state.sparks) {
          ctx.globalAlpha = Math.max(0, spark.life); ctx.fillStyle = spark.color; ctx.beginPath();
          ctx.arc(spark.x, spark.y, 3, 0, Math.PI * 2); ctx.fill();
        }
        ctx.globalAlpha = 1;

        ctx.fillStyle = "rgba(98, 213, 255, .2)"; ctx.fillRect(player.x - 5, player.y - 5, player.w + 10, player.h + 12);
        ctx.fillStyle = "#62d5ff"; ctx.fillRect(player.x, player.y, player.w, player.h);
        ctx.fillStyle = "#d9f7ff"; ctx.fillRect(player.x + 12, player.y + 4, player.w - 24, 3);
      }

      function loop(now) {
        if (!state.running || state.paused) return;
        const dt = Math.min(.034, (now - state.last) / 1000); state.last = now;
        update(dt); draw();
        if (state.running) requestAnimationFrame(loop);
      }

      draw();
    })();
  </script>
</body>
</html>
