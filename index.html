<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>面料颜色搭配工具</title>
<style>
  :root {
    --bg: #faf8f5;
    --card: #ffffff;
    --text: #2b2b2b;
    --muted: #8a8a8a;
    --accent: #b08d57;
    --border: #e8e3db;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
    background: var(--bg);
    color: var(--text);
    padding: 20px 16px 60px;
  }
  header {
    text-align: center;
    margin-bottom: 24px;
  }
  header h1 {
    font-size: 20px;
    font-weight: 600;
    margin: 0 0 4px;
  }
  header p {
    font-size: 13px;
    color: var(--muted);
    margin: 0;
  }
  .section-title {
    font-size: 14px;
    font-weight: 600;
    color: var(--muted);
    margin: 20px 0 10px 4px;
    letter-spacing: 1px;
  }
  .swatch-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(72px, 1fr));
    gap: 12px;
  }
  .swatch {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    cursor: pointer;
    background: none;
    border: none;
    padding: 0;
    font-family: inherit;
  }
  .swatch .chip {
    width: 56px;
    height: 56px;
    border-radius: 16px;
    border: 1px solid var(--border);
    box-shadow: 0 2px 6px rgba(0,0,0,0.06);
    transition: transform 0.15s ease, box-shadow 0.15s ease;
  }
  .swatch.selected .chip {
    transform: scale(1.08);
    box-shadow: 0 0 0 3px var(--accent), 0 4px 10px rgba(0,0,0,0.12);
  }
  .swatch span {
    font-size: 12px;
    color: var(--text);
  }
  .result-card {
    margin-top: 24px;
    background: var(--card);
    border-radius: 20px;
    padding: 20px 18px;
    box-shadow: 0 4px 16px rgba(0,0,0,0.06);
    display: none;
  }
  .result-card.show { display: block; }
  .result-main {
    display: flex;
    align-items: center;
    gap: 14px;
    padding-bottom: 16px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 16px;
  }
  .result-main .chip-lg {
    width: 48px;
    height: 48px;
    border-radius: 14px;
    border: 1px solid var(--border);
    flex-shrink: 0;
  }
  .result-main .label {
    font-size: 13px;
    color: var(--muted);
  }
  .result-main .name {
    font-size: 18px;
    font-weight: 600;
  }
  .match-list {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .match-item {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .match-item .chip-md {
    width: 40px;
    height: 40px;
    border-radius: 12px;
    border: 1px solid var(--border);
    flex-shrink: 0;
  }
  .match-item .name {
    font-size: 15px;
    font-weight: 500;
  }
  .match-item .desc {
    font-size: 12px;
    color: var(--muted);
  }
  .placeholder {
    text-align: center;
    color: var(--muted);
    font-size: 13px;
    padding: 30px 10px;
  }
</style>
</head>
<body>

<header>
  <h1>面料颜色搭配工具</h1>
  <p>选择一个主色，查看推荐搭配</p>
</header>

<div class="section-title">主色选择</div>
<div class="swatch-grid" id="mainGrid"></div>

<div class="result-card" id="resultCard">
  <div class="result-main">
    <div class="chip-lg" id="mainChip"></div>
    <div>
      <div class="label">当前主色</div>
      <div class="name" id="mainName"></div>
    </div>
  </div>
  <div class="section-title" style="margin:0 0 12px;">推荐搭配色</div>
  <div class="match-list" id="matchList"></div>
</div>

<div class="placeholder" id="placeholder">点击上方色块查看搭配建议</div>

<script>
const colors = [
  { key: "miBai",  name: "米白", hex: "#F1EBDD" },
  { key: "cangQing", name: "藏青", hex: "#1C2B4A" },
  { key: "tuoSe",  name: "驼色", hex: "#C29B6C" },
  { key: "kaQi",   name: "卡其", hex: "#C6B48A" },
  { key: "shenHui",name: "深灰", hex: "#4E4E4E" },
  { key: "hei",    name: "黑",   hex: "#1A1A1A" },
  { key: "bai",    name: "白",   hex: "#FFFFFF" },
  { key: "hongZong",name: "红棕", hex: "#8F4A2C" },
  { key: "moLv",   name: "墨绿", hex: "#2B4436" },
  { key: "qianLan",name: "浅蓝", hex: "#A9C6E0" },
];

const colorMap = Object.fromEntries(colors.map(c => [c.key, c]));

const matches = {
  miBai:   ["cangQing", "tuoSe", "qianLan"],
  cangQing:["miBai", "kaQi", "bai"],
  tuoSe:   ["cangQing", "shenHui", "bai"],
  kaQi:    ["cangQing", "bai", "hongZong"],
  shenHui: ["qianLan", "bai", "hei"],
  hei:     ["bai", "hongZong", "qianLan"],
  bai:     ["hei", "cangQing", "hongZong"],
  hongZong:["kaQi", "miBai", "hei"],
  moLv:    ["miBai", "tuoSe", "hei"],
  qianLan: ["bai", "shenHui", "miBai"],
};

const mainGrid = document.getElementById("mainGrid");
const resultCard = document.getElementById("resultCard");
const placeholder = document.getElementById("placeholder");
const mainChip = document.getElementById("mainChip");
const mainName = document.getElementById("mainName");
const matchList = document.getElementById("matchList");

colors.forEach(c => {
  const btn = document.createElement("button");
  btn.className = "swatch";
  btn.dataset.key = c.key;
  btn.innerHTML = `<div class="chip" style="background:${c.hex}"></div><span>${c.name}</span>`;
  btn.addEventListener("click", () => selectColor(c.key));
  mainGrid.appendChild(btn);
});

function selectColor(key) {
  document.querySelectorAll(".swatch").forEach(el => {
    el.classList.toggle("selected", el.dataset.key === key);
  });

  const main = colorMap[key];
  mainChip.style.background = main.hex;
  mainName.textContent = main.name;

  matchList.innerHTML = "";
  matches[key].forEach(mKey => {
    const m = colorMap[mKey];
    const row = document.createElement("div");
    row.className = "match-item";
    row.innerHTML = `
      <div class="chip-md" style="background:${m.hex}"></div>
      <div>
        <div class="name">${m.name}</div>
        <div class="desc">${m.hex.toUpperCase()}</div>
      </div>
    `;
    matchList.appendChild(row);
  });

  resultCard.classList.add("show");
  placeholder.style.display = "none";
}
</script>

</body>
</html>
