<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>扫雷</title>
<style>
  * {
    box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
    -webkit-user-select: none;
    -webkit-touch-callout: none;
  }
  html, body { overscroll-behavior-y: none; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
    background: #faf8f5;
    color: #2b2b2b;
    padding: 24px 12px 60px;
    min-height: 100vh;
  }
  .wrap { max-width: 480px; margin: 0 auto; }
  @media (min-width: 900px) {
    .wrap { max-width: 960px; }
  }
  header { text-align: center; margin-bottom: 14px; }
  header h1 { font-size: 22px; font-weight: 700; margin: 0 0 4px; }
  header p { font-size: 12px; color: #8a8a8a; margin: 0; }

  .level-row { display: flex; flex-wrap: wrap; justify-content: center; gap: 8px; margin-bottom: 16px; }
  .level-btn {
    padding: 7px 14px;
    border-radius: 999px;
    border: 1px solid #e8e3db;
    background: #ffffff;
    font-size: 13px;
    font-family: inherit;
    color: #2b2b2b;
    cursor: pointer;
  }
  .level-btn.active { background: #c9862f; border-color: #c9862f; color: #fff; font-weight: 600; }

  .frame-outer { display: flex; justify-content: center; }
  .game-frame {
    display: inline-block;
    background: #c0c0c0;
    padding: 8px;
    box-shadow: inset -3px -3px 0 0 #7b7b7b, inset 3px 3px 0 0 #ffffff;
    max-width: 100%;
  }
  .hud {
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: #c0c0c0;
    box-shadow: inset -2px -2px 0 0 #ffffff, inset 2px 2px 0 0 #7b7b7b;
    padding: 6px 8px;
    margin-bottom: 8px;
  }
  .counter {
    background: #000;
    color: #ff2b2b;
    font-family: "Courier New", monospace;
    font-size: 22px;
    font-weight: 700;
    padding: 2px 6px;
    letter-spacing: 2px;
    min-width: 54px;
    text-align: center;
    box-shadow: inset -1px -1px 0 0 #ffffff, inset 1px 1px 0 0 #7b7b7b;
  }
  .face-btn {
    width: 38px;
    height: 38px;
    font-size: 20px;
    background: #c0c0c0;
    border: none;
    box-shadow: inset -2px -2px 0 0 #7b7b7b, inset 2px 2px 0 0 #ffffff;
    cursor: pointer;
    line-height: 1;
  }
  .face-btn:active {
    box-shadow: inset 1px 1px 0 0 #7b7b7b, inset -1px -1px 0 0 #ffffff;
  }

  .flag-mode-btn {
    display: block;
    width: 100%;
    margin-bottom: 8px;
    padding: 8px 0;
    font-size: 13px;
    font-weight: 600;
    font-family: inherit;
    background: #c0c0c0;
    border: none;
    box-shadow: inset -2px -2px 0 0 #7b7b7b, inset 2px 2px 0 0 #ffffff;
    cursor: pointer;
    color: #2b2b2b;
  }
  .flag-mode-btn.active {
    box-shadow: inset 1px 1px 0 0 #7b7b7b, inset -1px -1px 0 0 #ffffff;
    background: #e8a45c;
    color: #fff;
  }

  .board-scroll {
    overflow-x: auto;
    max-width: 100%;
    box-shadow: inset -2px -2px 0 0 #ffffff, inset 2px 2px 0 0 #7b7b7b;
    background: #7b7b7b;
    padding: 3px;
  }
  .board {
    display: grid;
    gap: 0;
    width: max-content;
  }
  .msq-cell {
    width: 28px;
    height: 28px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 15px;
    font-weight: 700;
    font-family: "Courier New", monospace;
    background: #c0c0c0;
    box-shadow: inset -2px -2px 0 0 #7b7b7b, inset 2px 2px 0 0 #ffffff;
    cursor: pointer;
    position: relative;
  }
  .msq-cell.revealed {
    box-shadow: inset -1px -1px 0 0 #9c9c9c, inset 1px 1px 0 0 #9c9c9c;
    background: #c8c8c8;
    cursor: default;
  }
  .msq-cell.mine-hit { background: #ff2b2b; }
  .msq-cell.wrong-flag::after {
    content: "";
    position: absolute;
    inset: 4px;
    background:
      linear-gradient(45deg, transparent 45%, #ff2b2b 45%, #ff2b2b 55%, transparent 55%),
      linear-gradient(-45deg, transparent 45%, #ff2b2b 45%, #ff2b2b 55%, transparent 55%);
  }

  .hint {
    text-align: center;
    font-size: 12px;
    color: #8a8a8a;
    margin-top: 14px;
  }

  .leaderboard-btn {
    display: block;
    margin: 0 auto 16px;
    padding: 8px 20px;
    border-radius: 999px;
    border: 1px solid #e8e3db;
    background: #ffffff;
    font-size: 13px;
    font-family: inherit;
    color: #2b2b2b;
    cursor: pointer;
  }

  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.4);
    align-items: center;
    justify-content: center;
    padding: 20px;
    z-index: 100;
  }
  .modal-card {
    background: #fff;
    border-radius: 16px;
    padding: 20px;
    max-width: 360px;
    width: 100%;
    max-height: 80vh;
    overflow-y: auto;
    box-shadow: 0 10px 30px rgba(0,0,0,0.15);
  }
  .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
  .modal-header h2 { font-size: 17px; margin: 0; }
  .modal-close { background: none; border: none; font-size: 18px; cursor: pointer; color: #8a8a8a; }

  .modal-tabs { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 12px; }
  .lb-tab {
    padding: 5px 12px;
    border-radius: 999px;
    border: 1px solid #e8e3db;
    background: #faf8f5;
    font-size: 12px;
    font-family: inherit;
    cursor: pointer;
  }
  .lb-tab.active { background: #c9862f; border-color: #c9862f; color: #fff; }

  .lb-row {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 4px;
    border-bottom: 1px solid #f0ede6;
    font-size: 14px;
  }
  .lb-rank { width: 22px; font-weight: 700; color: #8a8a8a; }
  .lb-name { flex: 1; font-weight: 600; overflow-wrap: anywhere; }
  .lb-time { color: #c9862f; font-weight: 600; white-space: nowrap; }
  .lb-loading, .lb-error, .lb-empty { text-align: center; color: #8a8a8a; font-size: 13px; padding: 20px 0; }
  .lb-error { color: #c0392b; }

  #winModal .modal-card { text-align: center; }
  #winModal h2 { margin: 0 0 8px; }
  #winModal p { color: #8a8a8a; font-size: 13px; margin: 0 0 14px; }
  #nameInput {
    width: 100%;
    padding: 10px 12px;
    border-radius: 10px;
    border: 1px solid #e8e3db;
    font-size: 14px;
    font-family: inherit;
    margin-bottom: 12px;
    box-sizing: border-box;
  }
  .modal-actions { display: flex; gap: 10px; }
  .modal-actions button {
    flex: 1;
    padding: 10px 0;
    border-radius: 10px;
    border: none;
    font-size: 13px;
    font-family: inherit;
    font-weight: 600;
    cursor: pointer;
  }
  #skipSubmitBtn { background: #f0ede6; color: #2b2b2b; }
  #submitScoreBtn { background: #2b2b2b; color: #fff; }
  #submitStatus { font-size: 12px; margin-top: 10px; min-height: 16px; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>💣 扫雷</h1>
    <p>经典 Windows 扫雷玩法</p>
  </header>

  <div class="level-row">
    <button class="level-btn active" data-level="beginner">初级 9×9</button>
    <button class="level-btn" data-level="intermediate">中级 16×16</button>
    <button class="level-btn" data-level="expert">高级 30×16</button>
    <button class="level-btn" data-level="godlike">封神级 30×24</button>
  </div>

  <button class="leaderboard-btn" id="leaderboardBtn">🏆 排行榜</button>

  <div class="frame-outer">
    <div class="game-frame">
      <div class="hud">
        <div class="counter" id="mineCount">010</div>
        <button class="face-btn" id="faceBtn">🙂</button>
        <div class="counter" id="timer">000</div>
      </div>
      <button class="flag-mode-btn" id="flagModeBtn">🚩 插旗模式:关</button>
      <div class="board-scroll">
        <div class="board" id="board"></div>
      </div>
    </div>
  </div>

  <p class="hint">点击翻开 · 手机开启"插旗模式"后点格子插旗 · 电脑右键直接插旗</p>
</div>

<div class="modal-overlay" id="leaderboardModal">
  <div class="modal-card">
    <div class="modal-header">
      <h2>🏆 排行榜</h2>
      <button class="modal-close" id="closeLeaderboard">✕</button>
    </div>
    <div class="modal-tabs" id="leaderboardTabs"></div>
    <div id="leaderboardBody"></div>
  </div>
</div>

<div class="modal-overlay" id="winModal">
  <div class="modal-card">
    <h2>🎉 胜利!</h2>
    <p id="winTimeText"></p>
    <input type="text" id="nameInput" placeholder="输入你的名字" maxlength="20">
    <div class="modal-actions">
      <button id="skipSubmitBtn">跳过</button>
      <button id="submitScoreBtn">提交成绩</button>
    </div>
    <p id="submitStatus"></p>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
(function () {
"use strict";
const LEVELS = {
  beginner: { rows: 9, cols: 9, mines: 10 },
  intermediate: { rows: 16, cols: 16, mines: 40 },
  expert: { rows: 16, cols: 30, mines: 99 },
  godlike: { rows: 24, cols: 30, mines: 170 },
};

const NUM_COLORS = {
  1: "#0000ff", 2: "#008000", 3: "#ff0000", 4: "#000080",
  5: "#800000", 6: "#008080", 7: "#000000", 8: "#808080",
};

const SUPABASE_URL = "https://jgfixbzsnblfcomjmxuc.supabase.co";
const SUPABASE_KEY = "sb_publishable_trShHiFmgx3kTz_1kZPKqQ_qzMbAQnl";
const DIFFICULTY_LABELS = { beginner: "初级", intermediate: "中级", expert: "高级", godlike: "封神级" };

let sbClient = null;
function getClient() {
  if (!sbClient && window.supabase) {
    sbClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
  }
  return sbClient;
}

function escapeHtml(str) {
  return String(str).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
}

async function fetchLeaderboard(difficulty) {
  const client = getClient();
  if (!client) return { error: "加载失败,请检查网络" };
  const { data, error } = await client
    .from("leaderboard")
    .select("name,time_seconds,created_at")
    .eq("difficulty", difficulty)
    .order("time_seconds", { ascending: true })
    .limit(10);
  if (error) return { error: error.message };
  return { data };
}

async function submitScore(difficulty, name, timeSeconds) {
  const client = getClient();
  if (!client) return { error: "提交失败,请检查网络" };
  const { error } = await client.from("leaderboard").insert({ name, difficulty, time_seconds: timeSeconds });
  if (error) return { error: error.message };
  return { ok: true };
}

let currentLbDifficulty = "beginner";

async function renderLeaderboard(difficulty) {
  currentLbDifficulty = difficulty;
  const body = document.getElementById("leaderboardBody");
  body.innerHTML = `<p class="lb-loading">加载中…</p>`;
  const result = await fetchLeaderboard(difficulty);
  if (result.error) {
    body.innerHTML = `<p class="lb-error">${escapeHtml(result.error)}</p>`;
    return;
  }
  if (!result.data || result.data.length === 0) {
    body.innerHTML = `<p class="lb-empty">还没有人提交成绩,当第一名吧!</p>`;
    return;
  }
  body.innerHTML = result.data.map((row, i) => `
    <div class="lb-row">
      <span class="lb-rank">${i + 1}</span>
      <span class="lb-name">${escapeHtml(row.name)}</span>
      <span class="lb-time">${row.time_seconds}秒</span>
    </div>
  `).join("");
}

function renderLeaderboardTabs() {
  const tabsEl = document.getElementById("leaderboardTabs");
  tabsEl.innerHTML = Object.keys(LEVELS).map(key => `
    <button class="lb-tab${key === currentLbDifficulty ? " active" : ""}" data-diff="${key}">${DIFFICULTY_LABELS[key]}</button>
  `).join("");
  tabsEl.querySelectorAll(".lb-tab").forEach(btn => {
    btn.addEventListener("click", () => {
      tabsEl.querySelectorAll(".lb-tab").forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
      renderLeaderboard(btn.dataset.diff);
    });
  });
}

document.getElementById("leaderboardBtn").addEventListener("click", () => {
  document.getElementById("leaderboardModal").style.display = "flex";
  currentLbDifficulty = currentLevel;
  renderLeaderboardTabs();
  renderLeaderboard(currentLevel);
});

document.getElementById("closeLeaderboard").addEventListener("click", () => {
  document.getElementById("leaderboardModal").style.display = "none";
});

function showWinModal() {
  document.getElementById("winTimeText").textContent = `用时 ${elapsed} 秒 · 难度:${DIFFICULTY_LABELS[currentLevel]}`;
  const nameInput = document.getElementById("nameInput");
  nameInput.value = localStorage.getItem("minesweeperName") || "";
  document.getElementById("submitStatus").textContent = "";
  document.getElementById("winModal").style.display = "flex";
}

document.getElementById("skipSubmitBtn").addEventListener("click", () => {
  document.getElementById("winModal").style.display = "none";
});

document.getElementById("submitScoreBtn").addEventListener("click", async () => {
  const nameInput = document.getElementById("nameInput");
  const name = nameInput.value.trim();
  const statusEl = document.getElementById("submitStatus");
  if (!name) {
    statusEl.textContent = "请输入名字";
    return;
  }
  statusEl.textContent = "提交中…";
  localStorage.setItem("minesweeperName", name);
  const result = await submitScore(currentLevel, name, elapsed);
  if (result.error) {
    statusEl.textContent = "提交失败: " + result.error;
    return;
  }
  statusEl.textContent = "提交成功!";
  setTimeout(() => {
    document.getElementById("winModal").style.display = "none";
    document.getElementById("leaderboardBtn").click();
  }, 700);
});

let currentLevel = "beginner";
let ROWS, COLS, MINES;
let grid = [];
let gameState = "ready"; // ready | playing | won | lost
let flagCount = 0;
let firstClick = true;
let elapsed = 0;
let timerInterval = null;

const boardEl = document.getElementById("board");
const mineCountEl = document.getElementById("mineCount");
const timerEl = document.getElementById("timer");
const faceBtn = document.getElementById("faceBtn");

function makeGrid() {
  const g = [];
  for (let r = 0; r < ROWS; r++) {
    const row = [];
    for (let c = 0; c < COLS; c++) {
      row.push({ mine: false, revealed: false, flagged: false, adj: 0 });
    }
    g.push(row);
  }
  return g;
}

function neighbors(r, c) {
  const result = [];
  for (let dr = -1; dr <= 1; dr++) {
    for (let dc = -1; dc <= 1; dc++) {
      if (dr === 0 && dc === 0) continue;
      const nr = r + dr, nc = c + dc;
      if (nr >= 0 && nr < ROWS && nc >= 0 && nc < COLS) result.push([nr, nc]);
    }
  }
  return result;
}

function placeMines(excludeR, excludeC) {
  const excluded = new Set([`${excludeR},${excludeC}`, ...neighbors(excludeR, excludeC).map(([r, c]) => `${r},${c}`)]);
  let placed = 0;
  while (placed < MINES) {
    const r = Math.floor(Math.random() * ROWS);
    const c = Math.floor(Math.random() * COLS);
    const key = `${r},${c}`;
    if (excluded.has(key) || grid[r][c].mine) continue;
    grid[r][c].mine = true;
    placed++;
  }
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      if (grid[r][c].mine) continue;
      grid[r][c].adj = neighbors(r, c).filter(([nr, nc]) => grid[nr][nc].mine).length;
    }
  }
}

function startTimer() {
  if (timerInterval) return;
  timerInterval = setInterval(() => {
    elapsed = Math.min(999, elapsed + 1);
    updateHud();
  }, 1000);
}

function stopTimer() {
  clearInterval(timerInterval);
  timerInterval = null;
}

function floodReveal(r, c) {
  const stack = [[r, c]];
  while (stack.length) {
    const [cr, cc] = stack.pop();
    const cell = grid[cr][cc];
    if (cell.revealed || cell.flagged) continue;
    cell.revealed = true;
    if (cell.adj === 0 && !cell.mine) {
      neighbors(cr, cc).forEach(([nr, nc]) => {
        if (!grid[nr][nc].revealed && !grid[nr][nc].flagged) stack.push([nr, nc]);
      });
    }
  }
}

function revealAllMines() {
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      if (grid[r][c].mine) grid[r][c].revealed = true;
    }
  }
}

function flagAllMinesOnWin() {
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      if (grid[r][c].mine) grid[r][c].flagged = true;
    }
  }
  flagCount = MINES;
}

function checkWin() {
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      if (!grid[r][c].mine && !grid[r][c].revealed) return false;
    }
  }
  return true;
}

function revealCell(r, c) {
  if (gameState === "won" || gameState === "lost") return;
  const cell = grid[r][c];
  if (cell.revealed || cell.flagged) return;

  if (firstClick) {
    placeMines(r, c);
    firstClick = false;
    gameState = "playing";
    startTimer();
  }

  if (cell.mine) {
    cell.revealed = true;
    gameState = "lost";
    stopTimer();
    revealAllMines();
    render();
    return;
  }

  floodReveal(r, c);
  if (checkWin()) {
    gameState = "won";
    stopTimer();
    flagAllMinesOnWin();
    render();
    setTimeout(showWinModal, 500);
    return;
  }
  render();
}

function toggleFlag(r, c) {
  if (gameState === "won" || gameState === "lost") return;
  const cell = grid[r][c];
  if (cell.revealed) return;
  cell.flagged = !cell.flagged;
  flagCount += cell.flagged ? 1 : -1;
  render();
}

function cellContent(cell) {
  if (cell.flagged && !cell.revealed) return "🚩";
  if (!cell.revealed) return "";
  if (cell.mine) return "💣";
  if (cell.adj === 0) return "";
  return String(cell.adj);
}

function render() {
  boardEl.style.gridTemplateColumns = `repeat(${COLS}, 28px)`;
  boardEl.innerHTML = "";
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      const cell = grid[r][c];
      const div = document.createElement("div");
      div.className = "msq-cell" + (cell.revealed ? " revealed" : "");
      if (cell.revealed && cell.mine) div.classList.add("mine-hit");
      if (gameState === "lost" && cell.flagged && !cell.mine) div.classList.add("wrong-flag");
      div.textContent = cellContent(cell);
      if (cell.revealed && !cell.mine && cell.adj > 0) {
        div.style.color = NUM_COLORS[cell.adj];
      }
      div.dataset.r = r;
      div.dataset.c = c;
      boardEl.appendChild(div);
    }
  }
  updateHud();
  updateFace();
}

function updateHud() {
  mineCountEl.textContent = String(Math.max(0, MINES - flagCount)).padStart(3, "0");
  timerEl.textContent = String(elapsed).padStart(3, "0");
}

function updateFace() {
  if (gameState === "lost") faceBtn.textContent = "😵";
  else if (gameState === "won") faceBtn.textContent = "😎";
  else faceBtn.textContent = "🙂";
}

function resetGame() {
  grid = makeGrid();
  gameState = "ready";
  flagCount = 0;
  firstClick = true;
  elapsed = 0;
  stopTimer();
  render();
}

function setLevel(level) {
  currentLevel = level;
  const cfg = LEVELS[level];
  ROWS = cfg.rows;
  COLS = cfg.cols;
  MINES = cfg.mines;
  resetGame();
}

document.querySelectorAll(".level-btn").forEach(btn => {
  btn.addEventListener("click", () => {
    document.querySelectorAll(".level-btn").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    setLevel(btn.dataset.level);
  });
});

faceBtn.addEventListener("click", () => {
  if (gameState === "playing" && !confirm("确定要重新开始吗?当前进度会丢失。")) return;
  resetGame();
});

let flagMode = false;
const flagModeBtn = document.getElementById("flagModeBtn");
flagModeBtn.addEventListener("click", () => {
  flagMode = !flagMode;
  flagModeBtn.classList.toggle("active", flagMode);
  flagModeBtn.textContent = flagMode ? "🚩 插旗模式:开(点格子插旗)" : "🚩 插旗模式:关(点格子翻开)";
});

function handleCellTap(r, c) {
  if (flagMode) {
    toggleFlag(r, c);
  } else {
    revealCell(r, c);
  }
}

let touchMoved = false;
let touchHandled = false;

boardEl.addEventListener("touchstart", () => {
  touchMoved = false;
}, { passive: true });

boardEl.addEventListener("touchmove", () => {
  touchMoved = true;
}, { passive: true });

boardEl.addEventListener("touchend", (e) => {
  const target = e.target.closest(".msq-cell");
  touchHandled = true;
  setTimeout(() => { touchHandled = false; }, 500);
  if (touchMoved || !target) return;
  const r = Number(target.dataset.r), c = Number(target.dataset.c);
  handleCellTap(r, c);
}, { passive: true });

boardEl.addEventListener("click", (e) => {
  if (touchHandled) return;
  const target = e.target.closest(".msq-cell");
  if (!target) return;
  const r = Number(target.dataset.r), c = Number(target.dataset.c);
  handleCellTap(r, c);
});

boardEl.addEventListener("contextmenu", (e) => {
  e.preventDefault();
  const target = e.target.closest(".msq-cell");
  if (!target) return;
  const r = Number(target.dataset.r), c = Number(target.dataset.c);
  toggleFlag(r, c);
});

setLevel("beginner");
})();
</script>
</body>
</html>
