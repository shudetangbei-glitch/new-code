<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>每日暖心话</title>
<style>
  :root {
    --bg: #faf8f5;
    --card: #ffffff;
    --text: #2b2b2b;
    --muted: #8a8a8a;
    --border: #e8e3db;
    --encourage: #c9862f;
    --praise: #8b6dae;
    --care: #4e93a0;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
    background: var(--bg);
    color: var(--text);
    padding: 24px 16px 60px;
    min-height: 100vh;
  }
  .wrap { max-width: 480px; margin: 0 auto; }
  header { text-align: center; margin-bottom: 20px; }
  header h1 { font-size: 20px; font-weight: 600; margin: 0 0 4px; }
  header p { font-size: 13px; color: var(--muted); margin: 0; }

  .card {
    background: var(--card);
    border-radius: 18px;
    padding: 18px 18px 16px;
    margin-bottom: 14px;
    box-shadow: 0 3px 14px rgba(0,0,0,0.05);
    border-left: 4px solid var(--tag-color, var(--border));
  }
  .tag {
    display: inline-block;
    font-size: 11px;
    padding: 3px 10px;
    border-radius: 999px;
    background: color-mix(in srgb, var(--tag-color) 14%, white);
    color: var(--tag-color);
    font-weight: 600;
    margin-bottom: 10px;
  }
  .sentence { font-size: 16px; line-height: 1.6; margin-bottom: 14px; }
  .choices { display: flex; gap: 10px; }
  .choice-btn {
    flex: 1;
    padding: 10px 0;
    border-radius: 12px;
    border: 1px solid var(--border);
    background: var(--bg);
    font-size: 14px;
    font-family: inherit;
    color: var(--text);
    cursor: pointer;
    transition: all 0.15s ease;
  }
  .choice-btn.active-yes {
    background: color-mix(in srgb, var(--tag-color) 16%, white);
    border-color: var(--tag-color);
    color: var(--tag-color);
    font-weight: 600;
  }
  .choice-btn.active-no {
    background: #f1f1f1;
    border-color: #bbb;
    color: #666;
    font-weight: 600;
  }

  .submit-btn {
    width: 100%;
    padding: 14px 0;
    border-radius: 14px;
    border: none;
    background: #2b2b2b;
    color: white;
    font-size: 15px;
    font-family: inherit;
    font-weight: 600;
    cursor: pointer;
    margin-top: 6px;
    transition: opacity 0.15s ease;
  }
  .submit-btn:disabled { opacity: 0.35; cursor: not-allowed; }

  .done-card {
    background: var(--card);
    border-radius: 18px;
    padding: 26px 20px;
    text-align: center;
    box-shadow: 0 3px 14px rgba(0,0,0,0.05);
  }
  .done-card .emoji { font-size: 34px; margin-bottom: 10px; }
  .done-card h2 { font-size: 17px; margin: 0 0 6px; }
  .done-card p { font-size: 13px; color: var(--muted); margin: 0 0 4px; }
  .streak { font-size: 13px; color: var(--muted); margin-top: 14px; }
  .streak b { color: var(--text); font-size: 16px; }

  .weights {
    margin-top: 20px;
    background: var(--card);
    border-radius: 16px;
    padding: 16px 18px;
    box-shadow: 0 3px 14px rgba(0,0,0,0.05);
  }
  .weights h3 { font-size: 13px; color: var(--muted); margin: 0 0 12px; font-weight: 600; }
  .w-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
  .w-label { width: 44px; font-size: 12px; color: var(--muted); flex-shrink: 0; }
  .w-track { flex: 1; height: 8px; border-radius: 4px; background: #eee; overflow: hidden; }
  .w-fill { height: 100%; border-radius: 4px; }

  .history-toggle {
    display: block;
    text-align: center;
    font-size: 12px;
    color: var(--muted);
    margin-top: 16px;
    background: none;
    border: none;
    font-family: inherit;
    cursor: pointer;
    text-decoration: underline;
  }
  .history { margin-top: 12px; }
  .history-item {
    background: var(--card);
    border-radius: 14px;
    padding: 12px 16px;
    margin-bottom: 10px;
    font-size: 12px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.04);
  }
  .history-item .h-date { color: var(--muted); margin-bottom: 6px; font-weight: 600; }
  .history-item div.h-sentence { margin-bottom: 3px; line-height: 1.5; }

  .user-bar {
    display: none;
    flex-wrap: wrap;
    justify-content: center;
    align-items: center;
    gap: 4px 10px;
    font-size: 12px;
    color: var(--muted);
    margin: -8px 0 16px;
  }
  .user-bar b { color: var(--text); }
  .user-bar button {
    background: none;
    border: none;
    color: var(--muted);
    font-size: 12px;
    font-family: inherit;
    text-decoration: underline;
    cursor: pointer;
    padding: 0;
  }

  .auth-card {
    background: var(--card);
    border-radius: 18px;
    padding: 24px 20px;
    box-shadow: 0 3px 14px rgba(0,0,0,0.05);
  }
  .auth-card h2 { font-size: 16px; margin: 0 0 4px; text-align: center; }
  .auth-card p.auth-sub { font-size: 12px; color: var(--muted); text-align: center; margin: 0 0 20px; }
  .auth-field { margin-bottom: 14px; }
  .auth-field label { display: block; font-size: 12px; color: var(--muted); margin-bottom: 6px; }
  .auth-field input {
    width: 100%;
    padding: 11px 12px;
    border-radius: 10px;
    border: 1px solid var(--border);
    background: var(--bg);
    font-size: 14px;
    font-family: inherit;
    color: var(--text);
  }
  .auth-field input:focus { outline: none; border-color: var(--encourage); }
  .auth-error {
    font-size: 12px;
    color: #c0392b;
    margin: -4px 0 14px;
    min-height: 14px;
  }
  .auth-toggle {
    display: block;
    width: 100%;
    text-align: center;
    font-size: 12px;
    color: var(--muted);
    margin-top: 16px;
    background: none;
    border: none;
    font-family: inherit;
    cursor: pointer;
    text-decoration: underline;
  }
  .auth-hint {
    font-size: 11px;
    color: var(--muted);
    text-align: center;
    margin-top: 10px;
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>每日暖心话</h1>
    <p id="dateLabel"></p>
  </header>
  <div id="userBar" class="user-bar"></div>
  <input type="file" id="importFile" accept="application/json" style="display:none">
  <div id="app"></div>

function todayStr() {
  return new Date().toDateString();
}

function daysBetween(a, b) {
  return Math.round((new Date(b) - new Date(a)) / 86400000);
}

let CURRENT_USER = null;

function loadUsers() {
  const raw = localStorage.getItem(USERS_KEY);
  if (raw) {
    try { return JSON.parse(raw); } catch (e) {}
  }
  return {};
}

function saveUsers(users) {
  localStorage.setItem(USERS_KEY, JSON.stringify(users));
}

async function hashPassword(username, password) {
  const data = new TextEncoder().encode("dailyCheer::" + username + "::" + password);
  const buf = await crypto.subtle.digest("SHA-256", data);
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, "0")).join("");
}

function loadState() {
  const raw = localStorage.getItem(STATE_KEY_PREFIX + CURRENT_USER);
  if (raw) {
    try { return JSON.parse(raw); } catch (e) {}
  }
  return {
    weights: { encourage: 1, praise: 1, care: 1 },
    lastShown: {},
    today: null,
    streak: 0,
    lastCompletedDate: null,
    history: [],
  };
}

function saveState(state) {
  localStorage.setItem(STATE_KEY_PREFIX + CURRENT_USER, JSON.stringify(state));
}

function pickSentences(state) {
  const today = todayStr();
  const allEntries = [];
  Object.keys(POOL).forEach(cat => {
    POOL[cat].forEach((text, idx) => {
      const id = cat + "_" + idx;
      const lastShown = state.lastShown[id];
      const eligible = !lastShown || daysBetween(lastShown, today) >= COOLDOWN_DAYS;
      allEntries.push({ id, cat, text, lastShown: lastShown || null, eligible });
    });
  });

  const chosen = [];
  const usedIds = new Set();

  for (let i = 0; i < 3; i++) {
    let pool = allEntries.filter(e => e.eligible && !usedIds.has(e.id));
    if (pool.length === 0) {
      pool = allEntries
        .filter(e => !usedIds.has(e.id))
        .sort((a, b) => (a.lastShown || "0") < (b.lastShown || "0") ? -1 : 1);
    }
    if (pool.length === 0) break;

    const totalWeight = pool.reduce((sum, e) => sum + state.weights[e.cat], 0);
    let r = Math.random() * totalWeight;
    let selected = pool[0];
    for (const e of pool) {
      r -= state.weights[e.cat];
      if (r <= 0) { selected = e; break; }
    }
    chosen.push(selected);
    usedIds.add(selected.id);
  }

  chosen.forEach(c => { state.lastShown[c.id] = today; });
  return chosen.map(c => ({ id: c.id, cat: c.cat, text: c.text }));
}

function ensureToday(state) {
  const today = todayStr();
  if (!state.today || state.today.date !== today) {
    const items = pickSentences(state);
    state.today = { date: today, items, answers: [null, null, null], submitted: false };
    saveState(state);
  }
  return state;
}

function applyFeedback(state) {
  const { items, answers } = state.today;
  items.forEach((item, i) => {
    const delta = answers[i] ? LEARNING_RATE : -LEARNING_RATE;
    const next = state.weights[item.cat] + delta;
    state.weights[item.cat] = Math.min(MAX_WEIGHT, Math.max(MIN_WEIGHT, next));
  });

  const today = state.today.date;
  const y = new Date();
  y.setDate(y.getDate() - 1);
  const yesterday = y.toDateString();
  if (state.lastCompletedDate === yesterday) {
    state.streak += 1;
  } else if (state.lastCompletedDate !== today) {
    state.streak = 1;
  }
  state.lastCompletedDate = today;

  state.history.unshift({ date: today, items, answers: answers.slice() });
  state.history = state.history.slice(0, 30);

  saveState(state);
}

const app = document.getElementById("app");
const userBar = document.getElementById("userBar");
document.getElementById("dateLabel").textContent = new Date().toLocaleDateString("zh-CN", { year: "numeric", month: "long", day: "numeric", weekday: "long" });

let state = null;

function isCompletedToday() {
  return !!state.today.submitted;
}

function render() {
  app.innerHTML = "";
  if (isCompletedToday()) {
    renderDone();
  } else {
    renderQuestions();
  }
}

function renderQuestions() {
  const { items, answers } = state.today;

  items.forEach((item, i) => {
    const cat = CATS[item.cat];
    const card = document.createElement("div");
    card.className = "card";
    card.style.setProperty("--tag-color", cat.color);
    card.innerHTML = `
      <div class="tag">${cat.label}</div>
      <div class="sentence">${item.text}</div>
      <div class="choices">
        <button class="choice-btn ${answers[i] === true ? "active-yes" : ""}" data-i="${i}" data-v="yes">是,说到心里了</button>
        <button class="choice-btn ${answers[i] === false ? "active-no" : ""}" data-i="${i}" data-v="no">否,一般般</button>
      </div>
    `;
    app.appendChild(card);
  });

  const submitBtn = document.createElement("button");
  submitBtn.className = "submit-btn";
  submitBtn.textContent = "提交今天的感受";
  submitBtn.disabled = !answers.every(a => a !== null);
  app.appendChild(submitBtn);

  app.querySelectorAll(".choice-btn").forEach(btn => {
    btn.addEventListener("click", () => {
      const i = parseInt(btn.dataset.i, 10);
      state.today.answers[i] = btn.dataset.v === "yes";
      saveState(state);
      render();
    });
  });

  submitBtn.addEventListener("click", () => {
    if (!state.today.answers.every(a => a !== null)) return;
    applyFeedback(state);
    state.today.submitted = true;
    saveState(state);
    render();
  });
}

function renderDone() {
  const box = document.createElement("div");
  box.className = "done-card";
  box.innerHTML = `
    <div class="emoji">🌱</div>
    <h2>谢谢你的反馈</h2>
    <p>我已经记下了,会让明天的话更懂你一点。</p>
    <div class="streak">已经陪伴你 <b>${state.streak}</b> 天</div>
  `;
  app.appendChild(box);
  app.appendChild(renderWeights());
  app.appendChild(renderHistoryToggle());
}

function renderWeights() {
  const box = document.createElement("div");
  box.className = "weights";
  const title = document.createElement("h3");
  title.textContent = "学习进度(越长代表越懂你)";
  box.appendChild(title);

  const total = Object.values(state.weights).reduce((a, b) => a + b, 0);
  Object.keys(CATS).forEach(key => {
    const cat = CATS[key];
    const pct = Math.round((state.weights[key] / total) * 100);
    const row = document.createElement("div");
    row.className = "w-row";
    row.innerHTML = `
      <div class="w-label">${cat.label}</div>
      <div class="w-track"><div class="w-fill" style="width:${pct}%; background:${cat.color}"></div></div>
    `;
    box.appendChild(row);
  });
  return box;
}

function renderHistoryToggle() {
  const wrap = document.createElement("div");
  const btn = document.createElement("button");
  btn.className = "history-toggle";
  btn.textContent = "查看最近的记录";
  const list = document.createElement("div");
  list.className = "history";
  list.style.display = "none";

  state.history.slice(0, 7).forEach(h => {
    const item = document.createElement("div");
    item.className = "history-item";
    const dateLine = document.createElement("div");
    dateLine.className = "h-date";
    dateLine.textContent = h.date;
    item.appendChild(dateLine);
    h.items.forEach((it, i) => {
      const line = document.createElement("div");
      line.className = "h-sentence";
      line.textContent = (h.answers[i] ? "💛 " : "🤍 ") + it.text;
      item.appendChild(line);
    });
    list.appendChild(item);
  });

  btn.addEventListener("click", () => {
    list.style.display = list.style.display === "none" ? "block" : "none";
    btn.textContent = list.style.display === "none" ? "查看最近的记录" : "收起记录";
  });

  wrap.appendChild(btn);
  wrap.appendChild(list);
  return wrap;
}

function renderUserBar() {
  userBar.style.display = "flex";
  userBar.innerHTML = `
    <span>你好,<b>${CURRENT_USER}</b></span>
    <button id="exportBtn">导出备份</button>
    <button id="importBtn">导入备份</button>
    <button id="logoutBtn">退出登录</button>
  `;
  document.getElementById("logoutBtn").addEventListener("click", logout);
  document.getElementById("exportBtn").addEventListener("click", exportBackup);
  document.getElementById("importBtn").addEventListener("click", () => {
    document.getElementById("importFile").click();
  });
}

function exportBackup() {
  const payload = {
    app: "dailyCheer",
    version: 2,
    username: CURRENT_USER,
    exportedAt: new Date().toISOString(),
    state,
  };
  const blob = new Blob([JSON.stringify(payload, null, 2)], { type: "application/json" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = `每日暖心话备份_${CURRENT_USER}_${new Date().toISOString().slice(0, 10)}.json`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function importBackup(file) {
  const reader = new FileReader();
  reader.onload = () => {
    let payload;
    try {
      payload = JSON.parse(reader.result);
      if (!payload || !payload.state || !payload.state.weights) throw new Error("invalid");
    } catch (e) {
      alert("备份文件无效,无法导入。");
      return;
    }
    const fromUser = payload.username || "未知用户";
    const ok = confirm(`确定要用这份备份(来自"${fromUser}")覆盖当前账号"${CURRENT_USER}"的数据吗?此操作不可撤销。`);
    if (!ok) return;
    state = payload.state;
    saveState(state);
    state = ensureToday(state);
    render();
  };
  reader.readAsText(file);
}

document.getElementById("importFile").addEventListener("change", (e) => {
  const file = e.target.files[0];
  if (file) importBackup(file);
  e.target.value = "";
});

function startApp() {
  state = loadState();
  state = ensureToday(state);
  renderUserBar();
  render();
}

function logout() {
  CURRENT_USER = null;
  localStorage.removeItem(SESSION_KEY);
  state = null;
  userBar.style.display = "none";
  userBar.innerHTML = "";
  renderAuth();
}

function loginAs(username) {
  CURRENT_USER = username;
  localStorage.setItem(SESSION_KEY, username);
  startApp();
}

let authMode = "login";

function renderAuth() {
  app.innerHTML = "";
  const card = document.createElement("div");
  card.className = "auth-card";
  card.innerHTML = `
    <h2>${authMode === "login" ? "登录" : "注册新用户"}</h2>
    <p class="auth-sub">${authMode === "login" ? "登录后继续你的专属学习进度" : "创建账号,保存你自己的暖心记录"}</p>
    <div class="auth-field">
      <label>用户名</label>
      <input type="text" id="authUsername" autocomplete="username" placeholder="给自己起个名字">
    </div>
    <div class="auth-field">
      <label>密码</label>
      <input type="password" id="authPassword" autocomplete="${authMode === "login" ? "current-password" : "new-password"}" placeholder="至少4位">
    </div>
    <div class="auth-error" id="authError"></div>
    <button class="submit-btn" id="authSubmit">${authMode === "login" ? "登录" : "注册"}</button>
    <button class="auth-toggle" id="authToggle">${authMode === "login" ? "还没有账号?去注册" : "已经有账号?去登录"}</button>
    <p class="auth-hint">数据只保存在这台设备的浏览器里,换设备需要重新注册。</p>
  `;
  app.appendChild(card);

  document.getElementById("authToggle").addEventListener("click", () => {
    authMode = authMode === "login" ? "register" : "login";
    renderAuth();
  });

  const submit = async () => {
    const username = document.getElementById("authUsername").value.trim();
    const password = document.getElementById("authPassword").value;
    const errorBox = document.getElementById("authError");
    errorBox.textContent = "";

    if (!username || !password) {
      errorBox.textContent = "请输入用户名和密码";
      return;
    }
    if (username.length < 2) {
      errorBox.textContent = "用户名至少2个字符";
      return;
    }
    if (password.length < 4) {
      errorBox.textContent = "密码至少4位";
      return;
    }

    const users = loadUsers();
    const hash = await hashPassword(username, password);

    if (authMode === "register") {
      if (users[username]) {
        errorBox.textContent = "用户名已存在,换一个试试";
        return;
      }
      const isFirstUser = Object.keys(users).length === 0;
      users[username] = hash;
      saveUsers(users);
      if (isFirstUser) {
        const legacy = localStorage.getItem(LEGACY_STATE_KEY);
        if (legacy) localStorage.setItem(STATE_KEY_PREFIX + username, legacy);
      }
      loginAs(username);
    } else {
      if (!users[username] || users[username] !== hash) {
        errorBox.textContent = "用户名或密码不正确";
        return;
      }
      loginAs(username);
    }
  };

  document.getElementById("authSubmit").addEventListener("click", submit);
  document.getElementById("authPassword").addEventListener("keydown", (e) => {
    if (e.key === "Enter") submit();
  });
}

function boot() {
  const savedUser = localStorage.getItem(SESSION_KEY);
  const users = loadUsers();
  if (savedUser && users[savedUser]) {
    CURRENT_USER = savedUser;
    startApp();
  } else {
    renderAuth();
  }
}

boot();
</script>
</body>
</html>
