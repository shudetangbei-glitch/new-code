<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>每日暖心话</title>
<style>
  :root {
    --bg: #faf8f5;
    --card: #ffffff;
    --text: #2b2b2b;
    --muted: #8a8a8a;
    --border: #e8e3db;
    --encourage: #c9862f;
    --praise: #8b6dae;
    --care: #4e93a0;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
    background: var(--bg);
    color: var(--text);
    padding: 24px 16px 60px;
    min-height: 100vh;
  }
  .wrap { max-width: 480px; margin: 0 auto; position: relative; }
  header { text-align: center; margin-bottom: 20px; }
  .lang-toggle {
    display: none;
    position: absolute;
    top: 0;
    right: 0;
    background: none;
    border: 1px solid var(--border);
    border-radius: 999px;
    padding: 4px 10px;
    font-size: 11px;
    color: var(--muted);
    font-family: inherit;
    cursor: pointer;
  }
  header h1 { font-size: 20px; font-weight: 600; margin: 0 0 4px; }
  header p { font-size: 13px; color: var(--muted); margin: 0; }

  .card {
    background: var(--card);
    border-radius: 18px;
    padding: 18px 18px 16px;
    margin-bottom: 14px;
    box-shadow: 0 3px 14px rgba(0,0,0,0.05);
    border-left: 4px solid var(--tag-color, var(--border));
  }
  .tag {
    display: inline-block;
    font-size: 11px;
    padding: 3px 10px;
    border-radius: 999px;
    background: color-mix(in srgb, var(--tag-color) 14%, white);
    color: var(--tag-color);
    font-weight: 600;
    margin-bottom: 10px;
  }
  .sentence { font-size: 16px; line-height: 1.6; margin-bottom: 0; }

  .pet-row { display: flex; align-items: flex-start; gap: 10px; margin-bottom: 14px; }
  .pet { width: 42px; height: 42px; flex-shrink: 0; animation: petBob 2.6s ease-in-out infinite; }
  .pet svg { width: 100%; height: 100%; display: block; }
  .pet-ear-fill { fill: color-mix(in srgb, var(--tag-color) 35%, white); }
  .pet-ear-inner { fill: color-mix(in srgb, var(--tag-color) 55%, white); }
  .pet-head { fill: color-mix(in srgb, var(--tag-color) 16%, white); stroke: var(--tag-color); stroke-width: 1.5; }
  .pet-cheek { fill: #ffb3c0; opacity: 0.65; }
  .pet-eye-group {
    transform-box: fill-box;
    transform-origin: center;
    animation: petBlink 4.2s ease-in-out infinite;
  }
  .pet-eye-group.right { animation-delay: 0.12s; }
  .pet-eye { fill: #2b2b2b; }
  .pet-eye-shine { fill: #ffffff; }
  .pet-mouth { stroke: var(--tag-color); stroke-width: 1.6; stroke-linecap: round; stroke-linejoin: round; fill: none; }
  .pet-nose { fill: #ff8fa3; opacity: 0.85; }
  .pet-whisker line { stroke: var(--tag-color); stroke-width: 1; stroke-linecap: round; opacity: 0.55; }
  .pet-stripe { stroke: color-mix(in srgb, var(--tag-color) 55%, white); stroke-width: 2.5; stroke-linecap: round; fill: none; }

  @keyframes petBob {
    0%, 100% { transform: translateY(0) rotate(-3deg); }
    50% { transform: translateY(-4px) rotate(3deg); }
  }
  @keyframes petBlink {
    0%, 88%, 100% { transform: scaleY(1); }
    94% { transform: scaleY(0.12); }
  }

  .bubble {
    position: relative;
    flex: 1;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 4px 14px 14px 14px;
    padding: 10px 14px;
  }

  .choices { display: flex; gap: 10px; }
  .choice-btn {
    flex: 1;
    padding: 10px 0;
    border-radius: 12px;
    border: 1px solid var(--border);
    background: var(--bg);
    font-size: 14px;
    font-family: inherit;
    color: var(--text);
    cursor: pointer;
    transition: all 0.15s ease;
  }
  .choice-btn.active-yes {
    background: color-mix(in srgb, var(--tag-color) 16%, white);
    border-color: var(--tag-color);
    color: var(--tag-color);
    font-weight: 600;
  }
  .choice-btn.active-no {
    background: #f1f1f1;
    border-color: #bbb;
    color: #666;
    font-weight: 600;
  }

  .submit-btn {
    width: 100%;
    padding: 14px 0;
    border-radius: 14px;
    border: none;
    background: #2b2b2b;
    color: white;
    font-size: 15px;
    font-family: inherit;
    font-weight: 600;
    cursor: pointer;
    margin-top: 6px;
    transition: opacity 0.15s ease;
  }
  .submit-btn:disabled { opacity: 0.35; cursor: not-allowed; }

  .done-card {
    background: var(--card);
    border-radius: 18px;
    padding: 26px 20px;
    text-align: center;
    box-shadow: 0 3px 14px rgba(0,0,0,0.05);
  }
  .done-card .emoji { font-size: 34px; margin-bottom: 10px; }
  .done-card h2 { font-size: 17px; margin: 0 0 6px; }
  .done-card p { font-size: 13px; color: var(--muted); margin: 0 0 4px; }
  .streak { font-size: 13px; color: var(--muted); margin-top: 14px; }
  .streak b { color: var(--text); font-size: 16px; }

  .weights {
    margin-top: 20px;
    background: var(--card);
    border-radius: 16px;
    padding: 16px 18px;
    box-shadow: 0 3px 14px rgba(0,0,0,0.05);
  }
  .weights h3 { font-size: 13px; color: var(--muted); margin: 0 0 12px; font-weight: 600; }
  .w-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
  .w-label { width: 44px; font-size: 12px; color: var(--muted); flex-shrink: 0; }
  .w-track { flex: 1; height: 8px; border-radius: 4px; background: #eee; overflow: hidden; }
  .w-fill { height: 100%; border-radius: 4px; }

  .history-toggle {
    display: block;
    text-align: center;
    font-size: 12px;
    color: var(--muted);
    margin-top: 16px;
    background: none;
    border: none;
    font-family: inherit;
    cursor: pointer;
    text-decoration: underline;
  }
  .history { margin-top: 12px; }
  .history-item {
    background: var(--card);
    border-radius: 14px;
    padding: 12px 16px;
    margin-bottom: 10px;
    font-size: 12px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.04);
  }
  .history-item .h-date { color: var(--muted); margin-bottom: 6px; font-weight: 600; }
  .history-item div.h-sentence { margin-bottom: 3px; line-height: 1.5; }

  .user-bar {
    display: none;
    flex-wrap: wrap;
    justify-content: center;
    align-items: center;
    gap: 4px 10px;
    font-size: 12px;
    color: var(--muted);
    margin: -8px 0 16px;
  }
  .user-bar b { color: var(--text); }
  .user-bar button {
    background: none;
    border: none;
    color: var(--muted);
    font-size: 12px;
    font-family: inherit;
    text-decoration: underline;
    cursor: pointer;
    padding: 0;
  }

  .auth-card {
    background: var(--card);
    border-radius: 18px;
    padding: 24px 20px;
    box-shadow: 0 3px 14px rgba(0,0,0,0.05);
  }
  .auth-card h2 { font-size: 16px; margin: 0 0 4px; text-align: center; }
  .auth-card p.auth-sub { font-size: 12px; color: var(--muted); text-align: center; margin: 0 0 20px; }
  .auth-field { margin-bottom: 14px; }
  .auth-field label { display: block; font-size: 12px; color: var(--muted); margin-bottom: 6px; }
  .auth-field input {
    width: 100%;
    padding: 11px 12px;
    border-radius: 10px;
    border: 1px solid var(--border);
    background: var(--bg);
    font-size: 14px;
    font-family: inherit;
    color: var(--text);
  }
  .auth-field input:focus { outline: none; border-color: var(--encourage); }
  .auth-error {
    font-size: 12px;
    color: #c0392b;
    margin: -4px 0 14px;
    min-height: 14px;
  }
  .auth-toggle {
    display: block;
    width: 100%;
    text-align: center;
    font-size: 12px;
    color: var(--muted);
    margin-top: 16px;
    background: none;
    border: none;
    font-family: inherit;
    cursor: pointer;
    text-decoration: underline;
  }
  .auth-hint {
    font-size: 11px;
    color: var(--muted);
    text-align: center;
    margin-top: 10px;
  }
</style>

async function hashPassword(username, password) {
  const data = new TextEncoder().encode("dailyCheer::" + username + "::" + password);
  const buf = await crypto.subtle.digest("SHA-256", data);
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, "0")).join("");
}

function pickSentences(state) {
  const today = todayStr();
  const allEntries = [];
  const activePool = pool();
  Object.keys(activePool).forEach(cat => {
    activePool[cat].forEach((text, idx) => {
      const id = cat + "_" + idx;
      const lastShown = state.lastShown[id];
      const eligible = !lastShown || daysBetween(lastShown, today) >= COOLDOWN_DAYS;
      allEntries.push({ id, cat, text, lastShown: lastShown || null, eligible });
    });
  });

  const chosen = [];
  const usedIds = new Set();

  for (let i = 0; i < 3; i++) {
    let pool = allEntries.filter(e => e.eligible && !usedIds.has(e.id));
    if (pool.length === 0) {
      pool = allEntries
        .filter(e => !usedIds.has(e.id))
        .sort((a, b) => (a.lastShown || "0") < (b.lastShown || "0") ? -1 : 1);
    }
    if (pool.length === 0) break;

    const totalWeight = pool.reduce((sum, e) => sum + state.weights[e.cat], 0);
    let r = Math.random() * totalWeight;
    let selected = pool[0];
    for (const e of pool) {
      r -= state.weights[e.cat];
      if (r <= 0) { selected = e; break; }
    }
    chosen.push(selected);
    usedIds.add(selected.id);
  }

  chosen.forEach(c => { state.lastShown[c.id] = today; });
  return chosen.map(c => ({ id: c.id, cat: c.cat, text: c.text }));
}

async function ensureToday(state) {
  const today = todayStr();
  if (!state.today || state.today.date !== today) {
    const items = pickSentences(state);
    state.today = { date: today, items, answers: [null, null, null], submitted: false };
    await saveState(state);
  }
  return state;
}

function applyFeedback(state) {
  const { items, answers } = state.today;
  items.forEach((item, i) => {
    const delta = answers[i] ? LEARNING_RATE : -LEARNING_RATE;
    const next = state.weights[item.cat] + delta;
    state.weights[item.cat] = Math.min(MAX_WEIGHT, Math.max(MIN_WEIGHT, next));
  });

  const today = state.today.date;
  const y = new Date();
  y.setDate(y.getDate() - 1);
  const yesterday = y.toDateString();
  if (state.lastCompletedDate === yesterday) {
    state.streak += 1;
  } else if (state.lastCompletedDate !== today) {
    state.streak = 1;
  }
  state.lastCompletedDate = today;

  state.history.unshift({ date: today, items, answers: answers.slice() });
  state.history = state.history.slice(0, 30);
}

function importBackup(file) {
  const reader = new FileReader();
  reader.onload = async () => {
    let payload;
    try {
      payload = JSON.parse(reader.result);
      if (!payload || !payload.state || !payload.state.weights) throw new Error("invalid");
    } catch (e) {
      alert(t().importInvalid);
      return;
    }
    const fromUser = payload.username || t().unknownUser;
    const ok = confirm(t().importConfirm(fromUser, CURRENT_USER));
    if (!ok) return;
    state = payload.state;
    await saveState(state);
    state = await ensureToday(state);
    render();
  };
  reader.readAsText(file);
}

document.getElementById("importFile").addEventListener("change", (e) => {

    renderAuth();

  const submit = async () => {
    const username = document.getElementById("authUsername").value.trim();
    const password = document.getElementById("authPassword").value;
    const errorBox = document.getElementById("authError");
    const submitBtn = document.getElementById("authSubmit");
    errorBox.textContent = "";

    if (!username || !password) {
      errorBox.textContent = t().errEmpty;
      return;
    }
    if (username.length < 2) {
      errorBox.textContent = t().errUsernameLen;
      return;
    }
    if (password.length < 4) {
      errorBox.textContent = t().errPasswordLen;
      return;
    }

    submitBtn.disabled = true;
    const hash = await hashPassword(username, password);

    if (authMode === "register") {
      const existing = await fetchUserRow(username);
      if (existing.error) {
        errorBox.textContent = existing.error;
        submitBtn.disabled = false;
        return;
      }
      if (existing.data) {
        errorBox.textContent = t().errDupUser;
        submitBtn.disabled = false;
        return;
      }
      const legacy = localStorage.getItem(LEGACY_STATE_KEY);
      let initialState = defaultState();
      if (legacy) {
        try { initialState = JSON.parse(legacy); } catch (e) {}
        localStorage.removeItem(LEGACY_STATE_KEY);
      }
      const insertResult = await insertUserRow(username, hash, initialState);
      if (insertResult.error) {
        errorBox.textContent = insertResult.error;
        submitBtn.disabled = false;
        return;
      }
      await loginAs(username, initialState);
    } else {
      let result = await fetchUserRow(username);
      if (!result.error && !result.data) {
        const migrated = await migrateLegacyAccountIfNeeded(username);
        if (migrated) result = migrated;
      }
      if (result.error) {
        errorBox.textContent = result.error;
        submitBtn.disabled = false;
        return;
      }
      if (!result.data || result.data.password_hash !== hash) {
        errorBox.textContent = t().errBadLogin;
        submitBtn.disabled = false;
        return;
      }
      await loginAs(username, result.data.state || defaultState());
    }
  };

  document.getElementById("authSubmit").addEventListener("click", submit);
  document.getElementById("authPassword").addEventListener("keydown", (e) => {
    if (e.key === "Enter") submit();
  });
}

  card.innerHTML = `
    <h2>选择语言 / Choose Language</h2>
    <p class="auth-sub">选择你想使用的语言 / Pick the language you'd like to use</p>
    <button class="submit-btn" id="pickZh" style="margin-bottom:10px;">中文</button>
    <button class="submit-btn" id="pickEn">English</button>
  `;
  app.appendChild(card);
  document.getElementById("pickZh").addEventListener("click", () => chooseLang("zh"));
  document.getElementById("pickEn").addEventListener("click", () => chooseLang("en"));
}

function chooseLang(lang) {
  LANG = lang;
  localStorage.setItem(LANG_KEY, lang);
  applyStaticLangText();
  proceedAfterLang();
}

function renderResuming(username) {
  app.innerHTML = "";
  const card = document.createElement("div");
  card.className = "auth-card";
  card.innerHTML = `<p class="auth-sub" style="margin:0;">${LANG === "en" ? `Signing back in as ${username}…` : `正在恢复 ${username} 的登录状态…`}</p>`;
  app.appendChild(card);
}

function renderResumeError(username, message) {
  app.innerHTML = "";
  const card = document.createElement("div");
  card.className = "auth-card";
  card.innerHTML = `
    <p class="auth-error" style="margin:0 0 14px;text-align:center;">${LANG === "en" ? "Couldn't sign back in: " : "恢复登录失败: "}${message}</p>
    <button class="submit-btn" id="retryResumeBtn">${LANG === "en" ? "Retry" : "重试"}</button>
    <button class="auth-toggle" id="switchAccountBtn">${LANG === "en" ? "Use a different account" : "换个账号登录"}</button>
  `;
  app.appendChild(card);
  document.getElementById("retryResumeBtn").addEventListener("click", proceedAfterLang);
  document.getElementById("switchAccountBtn").addEventListener("click", () => {
    localStorage.removeItem(SESSION_KEY);
    renderAuth();
  });
}

async function proceedAfterLang() {
  const savedUser = localStorage.getItem(SESSION_KEY);
  if (!savedUser) {
    renderAuth();
    return;
  }
  renderResuming(savedUser);
  let result = await fetchUserRow(savedUser);
  if (!result.error && !result.data) {
    const migrated = await migrateLegacyAccountIfNeeded(savedUser);
    if (migrated) result = migrated;
  }
  if (result.error) {
    renderResumeError(savedUser, result.error);
    return;
  }
  if (!result.data) {
    localStorage.removeItem(SESSION_KEY);
    renderAuth();
    return;
  }
  CURRENT_USER = savedUser;
  await startApp(result.data.state || defaultState());
}

function boot() {
  const savedLang = localStorage.getItem(LANG_KEY);
  if (savedLang) {
    LANG = savedLang;
    applyStaticLangText();
    proceedAfterLang();
  } else {
    renderLangPicker();
  }
}

async function refreshIfNewDay() {
  if (!CURRENT_USER || !state) return;
  if (state.today.date !== todayStr()) {
    state = await ensureToday(state);
    updateDateLabel();
    render();
  }
}

document.addEventListener("visibilitychange", () => {
  if (document.visibilityState === "visible") refreshIfNewDay();
});
window.addEventListener("focus", refreshIfNewDay);
window.addEventListener("pageshow", refreshIfNewDay);

boot();
</script>
</body>
</html>
